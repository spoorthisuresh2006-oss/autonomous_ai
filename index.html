<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SENTINEL AI — Autonomous Cyber Threat Detection & Response System. Secure login portal.">
  <title>SENTINEL AI — Secure Access</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>
  <div class="login-wrapper">
    <!-- Particle network background -->
    <canvas id="particle-canvas"></canvas>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="shield-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--cyan);">
            <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/>
            <path d="M12 8v4M12 16h.01" opacity="0.6"/>
            <circle cx="12" cy="12" r="3" opacity="0.3"/>
          </svg>
        </div>
        <h1>SENTINEL <span class="accent">AI</span></h1>
        <p class="tagline">Autonomous Threat Detection System</p>
      </div>

      <!-- Status message -->
      <div class="login-status" id="loginStatus"></div>

      <!-- Role Tabs -->
      <div class="role-tabs">
        <button class="role-tab active" data-role="admin" id="tabAdmin">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
            <path d="M12 2a5 5 0 0 1 5 5v3H7V7a5 5 0 0 1 5-5z"/>
            <rect x="3" y="10" width="18" height="12" rx="2"/>
          </svg>
          Admin
        </button>
        <button class="role-tab" data-role="analyst" id="tabAnalyst">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Analyst
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Operator ID</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username" placeholder="Enter your operator ID" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Access Key</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter your access key" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="tfa-toggle">
            <input type="checkbox" id="tfaToggle">
            <span class="tfa-slider"></span>
            2FA Enabled
          </label>
          <a href="#" class="forgot-link">Forgot Key?</a>
        </div>

        <!-- 2FA Code field (hidden by default) -->
        <div class="form-group" id="tfaGroup" style="display:none;">
          <label for="tfaCode">2FA Verification Code</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M7 12h2M11 12h2M15 12h2"/>
            </svg>
            <input type="text" id="tfaCode" name="tfaCode" placeholder="Enter 6-digit code" maxlength="6">
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Initialize Secure Session
        </button>
      </form>

      <!-- Biometric -->
      <div class="fingerprint-section">
        <p>or authenticate via biometric</p>
        <button class="fingerprint-btn" id="fingerprintBtn" aria-label="Biometric authentication">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12C2 6.48 6.48 2 12 2"/>
            <path d="M22 12c0 5.52-4.48 10-10 10"/>
            <path d="M7 12a5 5 0 0 1 10 0"/>
            <path d="M12 12a5 5 0 0 1-5 5"/>
            <path d="M12 7v10"/>
          </svg>
        </button>
      </div>

      <!-- Security badge -->
      <div class="security-badge">
        <span><span class="dot"></span> AES-256 Encrypted &bull; Zero Trust Architecture</span>
      </div>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
